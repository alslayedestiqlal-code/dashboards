<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة التدريب المستدام: ابنِ أكاديمية المستقبل</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts for Arabic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(220, 252, 231, 0.5);
        }
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-bounce-slow {
            animation: bounce-slow 3s infinite ease-in-out;
        }
        @keyframes float-item {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .unlocked-item {
            animation: float-item 2s ease-in-out infinite;
        }
    </style>
</head>
<body class="p-2 md:p-6 flex items-center justify-center">

    <div id="root" class="w-full max-w-4xl"></div>

    <script type="text/babel">
        // Web Audio Synth for game sounds
        const playSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'success') {
                    // Two-tone happy sound
                    osc.frequency.setValueAtTime(587.33, ctx.currentTime); // D5
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    osc.start();
                    osc.frequency.setValueAtTime(880, ctx.currentTime + 0.1); // A5
                    gain.gain.setValueAtTime(0.1, ctx.currentTime + 0.1);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
                    osc.stop(ctx.currentTime + 0.4);
                } else if (type === 'error') {
                    // Buzz sound
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(120, ctx.currentTime);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'complete') {
                    // Ascending fanfare
                    const notes = [261.63, 329.63, 392.00, 523.25]; // C major chord
                    notes.forEach((freq, i) => {
                        const noteOsc = ctx.createOscillator();
                        const noteGain = ctx.createGain();
                        noteOsc.connect(noteGain);
                        noteGain.connect(ctx.destination);
                        noteOsc.frequency.setValueAtTime(freq, ctx.currentTime + (i * 0.1));
                        noteGain.gain.setValueAtTime(0.1, ctx.currentTime + (i * 0.1));
                        noteGain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + (i * 0.1) + 0.3);
                        noteOsc.start(ctx.currentTime + (i * 0.1));
                        noteOsc.stop(ctx.currentTime + (i * 0.1) + 0.3);
                    });
                }
            } catch (e) {
                console.log("Audio not supported yet.");
            }
        };

        function App() {
            // Screen state: 'intro' | 'play' | 'outro'
            const [screen, setScreen] = React.useState('intro');
            const [currentStage, setCurrentStage] = React.useState(1); // 1, 2, 3
            const [score, setScore] = React.useState(0);
            const [wrongAnswers, setWrongAnswers] = React.useState(0);
            const [unlockedItems, setUnlockedItems] = React.useState([]); // items unlocked in the academy
            const [feedback, setFeedback] = React.useState(null); // { isCorrect: bool, text: string }
            const [stage1Index, setStage1Index] = React.useState(0);
            const [stage2Sorted, setStage2Sorted] = React.useState([]); // array of sorted items
            const [stage3Index, setStage3Index] = React.useState(0);

            // Game Assets / Building parts
            const academyItems = [
                { id: 'solar', name: 'أجهزة الطاقة الشمسية', icon: '☀️', desc: 'تزويد مبنى التدريب بطاقة متجددة وصديقة للبيئة لتقليل البصمة الكربونية.', stage: 1 },
                { id: 'library', name: 'المكتبة الرقمية المستدامة', icon: '💻', desc: 'توفير مئات المراجع التفاعلية لترسيخ التعلم مدى الحياة دون استهلاك أوراق.', stage: 1 },
                { id: 'garden', name: 'الحديقة المجتمعية التفاعلية', icon: '🌳', desc: 'مساحة خضراء تدعم البيئة وتزيد رفاهية وتواصل المتدربين.', stage: 2 },
                { id: 'classroom', name: 'الفصول الذكية المرنة', icon: '🏫', desc: 'تعتمد التقنيات الحديثة والتعليم الهجين لتقليل تكلفة الانبعاثات والتنقل.', stage: 3 }
            ];

            // STAGE 1 DATA: Measuring pure conceptual knowledge (Zero Organization names, Zero Individual names)
            // Fully inspired by "مفهوم التدريب المستدام وأهميته.pptx"
            const stage1Questions = [
                {
                    quote: "أي من الخيارات التالية يعبر بدقة عن 'المفهوم الشامل والغاية الأساسية' للتدريب المستدام؟",
                    options: [
                        { name: "عملية تعلم مدى الحياة تهدف لتزويد المتعلمين بالمعرفة والمهارات اللازمة لدعم التنمية بأبعادها الاقتصادية والاجتماعية والبيئية بشكل متكامل.", isCorrect: true, reason: "هذا هو الجوهر المتكامل للتدريب المستدام؛ كونه عملية مستمرة تراعي الأبعاد الثلاثة وتنمي القدرات المستقبلية." },
                        { name: "برامج تدريبية سريعة ومكثفة تركز فقط على سد الاحتياج المهني المباشر دون النظر للتأثير البيئي أو المجتمعي بعيد المدى.", isCorrect: false, reason: "البرامج السريعة والمحدودة التي تتجاهل البيئة والمجتمع تناقض مفهوم الاستدامة والاستمرارية." },
                        { name: "عملية تعليمية تقليدية جامدة تعتمد على الحفظ الورقي لتقليل تكلفة البنية التكنولوجية للمؤسسة التدريبية.", isCorrect: false, reason: "التدريب المستدام يحارب الجمود ويسعى للمواءمة الرقمية والبيئية ولا يعتمد على الطرق الورقية التقليدية." },
                        { name: "دورات تقنية بحتة يتم تصميمها لمرة واحدة فقط دون إمكانية تحديثها لتفادي نفقات الصيانة الإدارية.", isCorrect: false, reason: "عدم قابلية التحديث يتناقض مع ركيزة التكيف المستمر واكتساب المهارات المستقبلية المتغيرة." }
                    ]
                },
                {
                    quote: "في عالم يتسم بالتغيرات التكنولوجية المتسارعة، ما هي الركيزة الأساسية التي يستند إليها التدريب المستدام لضمان مرونة المتدرب وقابليته للتوظيف المستمر؟",
                    options: [
                        { name: "التركيز المطلق على مهارة فنية واحدة شديدة التخصص دون تغييرها طوال الحياة المهنية.", isCorrect: false, reason: "هذا يؤدي لعدم المرونة وفقدان الوظيفة عند أتمتة المهارة؛ فالتدريب المستدام يركز على المهارات القابلة للتكيف." },
                        { name: "مبدأ 'التعلم مدى الحياة' واكتساب مهارات مستقبلية مرنة تمكن الفرد من التكيف مع التحولات الاقتصادية والاجتماعية.", isCorrect: true, reason: "التعلم مدى الحياة والتكيف هما الركيزتان الذهبيتان لمواكبة تغيرات سوق العمل والتحولات المتسارعة." },
                        { name: "توفير قاعات تدريب فارهة ومكيفة دون الاهتمام بتحديث المحتوى التدريبي أو مهارات المدرب.", isCorrect: false, reason: "التركيز على المظهر الخارجي والقاعات فقط دون المحتوى الفكري والتكيف المعرفي يهدر الموارد ولا يحقق تنمية حقيقية." },
                        { name: "جعل التدريب حضورياً وإلزامياً بنسبة 100% لجميع التخصصات دون إتاحة خيارات التعليم المدمج أو المرن.", isCorrect: false, reason: "هذا يقلل مرونة الفرد ويتجاهل تيسير الوصول وتكافؤ الفرص الذي ينادي به البُعد الاجتماعي للمفهوم." }
                    ]
                },
                {
                    quote: "يسهم التدريب المستدام بشكل مباشر في 'التطوير الشخصي' وصحة المتدرب الذهنية. ما هو التفسير العلمي لهذا الأثر الإيجابي؟",
                    options: [
                        { name: "عن طريق فرض اختبارات يومية مشددة وضغوط مستمرة لإجبار الدماغ على الحفظ السريع.", isCorrect: false, reason: "الضغط والتوتر يضران بالصحة العقلية ولا يحققان الرضا الشخصي أو التفكير النقدي المتزن." },
                        { name: "عن طريق تحفيز الدماغ من خلال التعلم المستمر، بناء الثقة بالنفس، وتوسيع الآفاق الفكرية، مما يعزز الصحة العقلية والرضا الشخصي.", isCorrect: true, reason: "اكتساب مهارات جديدة واستكشاف الشغف ينشط الدماغ، ويقلل التدهور العقلي مع تقدم العمر، ويرفع تقدير الذات والرضا." },
                        { name: "بتقليل التفاعل الاجتماعي وحصر التعليم في القراءة الفردية الصامتة لتجنب الاختلاف في وجهات النظر.", isCorrect: false, reason: "التدريب المستدام يدعم التفاعل وتوسيع الآفاق الفكرية من خلال التعرف على الأفكار المتنوعة وليس العزلة." },
                        { name: "بربط قيمة الفرد التدريبية بحجم المكاسب المالية الفورية التي يحققها بعد انتهاء الدورة مباشرة.", isCorrect: false, reason: "هذا تفكير مادي ضيق؛ الاستدامة ترى التطوير الشخصي كعملية تراكمية وبناء شامل للشخصية والقدرة على المساهمة المجتمعية." }
                    ]
                },
                {
                    quote: "أي من الخيارات التالية يوضح التماسك المفاهيمي لعلاقة التدريب المستدام بالتنمية المستدامة بشكل عام؟",
                    options: [
                        { name: "التدريب المستدام يعمل بمعزل تام عن الأنشطة البيئية والمجتمعية، ويركز فقط على الأنشطة الصناعية الصرفة.", isCorrect: false, reason: "هذا تفكير مجتزأ؛ فالاستدامة بطبيعتها مفهوم تكاملي يربط التدريب بكافة ممارسات التنمية." },
                        { name: "التدريب المستدام استثمار ذاتي ومجتمعي يطور الكوادر البشرية لتصبح واعية ومؤهلة لحفظ البيئة، ودعم المجتمع، وتحقيق النمو الاقتصادي المستقر.", isCorrect: true, reason: "الأفراد المدربون بشكل مستمر يمثلون القوة الدافعة للمساهمة الإيجابية في مجتمعاتهم وحفظ موارد الكوكب للأجيال القادمة." },
                        { name: "يهدف التدريب المستدام لتجميل الصورة الإعلامية للمؤسسات دون إحداث تغيير حقيقي في سلوكيات وقيم المتدربين.", isCorrect: false, reason: "الاستدامة قائمة على الأثر الحقيقي المستمر وتعديل السلوك وبناء القيم لخدمة البشرية، وليس الدعاية المؤقتة." },
                        { name: "تقليص فرص التعلم واقتصارها على فئات محددة في المجتمع لضمان سهولة الإدارة والتوجيه.", isCorrect: false, reason: "هذا يتعارض تماماً مع مبدأ العدالة الاجتماعية وتكافؤ الفرص وتمكين المجتمعات الذي يرتكز عليه المفهوم." }
                    ]
                }
            ];

            // STAGE 2 DATA: Sorting into Dimensions
            const stage2Pool = [
                { id: 'p1', text: "الحد من استهلاك الورق والموارد الطبيعية أثناء التدريب", dimension: 'environmental', dimensionName: 'البعد البيئي', reason: "يتعلق بحفظ الموارد الطبيعية وحماية البيئة." },
                { id: 'p2', text: "تحسين مهارات الأفراد لرفع إنتاجيتهم ودعم نمو السوق", dimension: 'economic', dimensionName: 'البعد الاقتصادي', reason: "يسهم في استدامة الأعمال والإنتاجية ومواكبة سوق العمل." },
                { id: 'p3', text: "تعزيز العدالة الاجتماعية وتكافؤ الفرص في الحصول على المعرفة", dimension: 'social', dimensionName: 'البعد الاجتماعي', reason: "يهدف لبناء مجتمع عادل وشامل يدعم تمكين الجميع." },
                { id: 'p4', text: "مراعاة البصمة الكربونية للتنقل عبر تقديم خيارات التدريب الرقمي والمدمج", dimension: 'environmental', dimensionName: 'البعد البيئي', reason: "يهدف للحد من الانبعاثات والمخاطر البيئية الناتجة عن التنقل." },
                { id: 'p5', text: "تطوير مهارات التفكير النقدي وحل المشكلات لزيادة ثقة المتدربين بأنفسهم", dimension: 'social', dimensionName: 'البعد الاجتماعي', reason: "يرتبط بالتطوير الاجتماعي والشخصي وبناء قدرات الإنسان الفردية والمجتمعية." },
                { id: 'p6', text: "تقليل تكاليف إعادة التدريب من خلال تصميم برامج مرنة وطويلة الأمد ومستمرة", dimension: 'economic', dimensionName: 'البعد الاقتصادي', reason: "يوفر الكلفة المالية ويحقق الاستثمار الأمثل للموارد الاقتصادية للمؤسسات." }
            ];

            // STAGE 3 DATA: Scenario-based decision making
            const stage3Questions = [
                {
                    scenario: "تريد مؤسستك تصميم برنامج تدريبي مستدام للموظفين الجدد حول 'المهارات الرقمية'. ما هي الخطوة الأكثر تجسيداً لقيم التدريب المستدام الشامل؟",
                    options: [
                        { text: "تقديمه بشكل مدمج يدمج بين التدريب الرقمي والحضوري، مع توفير المحتوى مدى الحياة وتوجيه الموظفين لتطبيقه لتقليل الهدر.", isCorrect: true, score: 25, reason: "هذا الخيار يدعم التعلم مدى الحياة، ويوائم المهارات المستقبلية ويقلل الأثر البيئي والمالي للمؤسسة." },
                        { text: "طباعة كتاب تدريبي ضخم ملون لكل موظف وعقد ورشة حضورية إلزامية يومية تتطلب السفر والترحال.", isCorrect: false, score: 0, reason: "هذا الخيار غير مستدام بيئياً (استهلاك ورق كبير) ولا يراعي المهارات الرقمية المدمجة." },
                        { text: "شراء دورة تدريبية جاهزة من الإنترنت لا يمكن تعديلها أو تحديثها مستقبلاً وعرضها لمرة واحدة فقط.", isCorrect: false, score: 0, reason: "البرامج غير القابلة للتحديث تفتقر لمرونة التدريب المستدام والتعلم طويل الأجل." }
                    ]
                },
                {
                    scenario: "واجهت ميزانية التدريب السنوية في شركتك عجزاً مالياً حاداً، كيف يتصرف 'المصمم التعليمي المستدام' لمواجهة هذا التحدي الاقتصادي دون التضحية بالمتدربين؟",
                    options: [
                        { text: "إلغاء جميع الأنشطة التدريبية فوراً وانتظار ميزانية العام المقبل.", isCorrect: false, score: 0, reason: "إلغاء التدريب يضر بالنمو المهني المستمر وتطور الموظفين." },
                        { text: "الاعتماد على مبدأ 'نقل المعرفة الداخلي' وتأهيل مدربين من داخل المؤسسة (Train-the-Trainer) لبناء قدرات مستمرة وبكلفة منخفضة.", isCorrect: true, score: 25, reason: "هذا يجسد الاستدامة من خلال تمكين الكوادر الداخلية وبناء مهارات تدوم وتوفر النفقات الاقتصادية." },
                        { text: "إجبار الموظفين على دفع تكاليف تدريبهم الشخصي خارج أوقات العمل الرسمية بشكل كامل.", isCorrect: false, score: 0, reason: "هذا يخل ببعد العدالة الاجتماعية والمساؤولية المؤسسية للتدريب المستدام." }
                    ]
                }
            ];

            // Helper to unlock items based on progress
            const unlockItem = (itemId) => {
                if (!unlockedItems.includes(itemId)) {
                    setUnlockedItems(prev => [...prev, itemId]);
                }
            };

            const handleStage1Answer = (option) => {
                if (feedback) return; // Prevent multiple clicks

                if (option.isCorrect) {
                    playSound('success');
                    setScore(prev => prev + 15);
                    setFeedback({
                        isCorrect: true,
                        text: `إجابة رائعة ومعرفة دقيقة! ${option.reason}`
                    });
                    // Unlock corresponding stage item
                    if (stage1Index === 0) unlockItem('solar');
                    if (stage1Index === 2) unlockItem('library');
                } else {
                    playSound('error');
                    setWrongAnswers(prev => prev + 1);
                    setFeedback({
                        isCorrect: false,
                        text: `بحاجة إلى إعادة تفكير! ${option.reason}`
                    });
                }
            };

            const nextStage1Question = () => {
                setFeedback(null);
                if (stage1Index < stage1Questions.length - 1) {
                    setStage1Index(prev => prev + 1);
                } else {
                    // Transition to Stage 2
                    setCurrentStage(2);
                }
            };

            const handleStage2Sort = (item, selectedDimension) => {
                if (stage2Sorted.includes(item.id)) return;

                if (item.dimension === selectedDimension) {
                    playSound('success');
                    setScore(prev => prev + 15);
                    setStage2Sorted(prev => [...prev, item.id]);
                    setFeedback({
                        isCorrect: true,
                        text: `صحيح! "${item.text}" يقع مباشرة ضمن [${item.dimensionName}]. ${item.reason}`
                    });
                    // Unlock garden on progress
                    if (stage2Sorted.length >= 2) {
                        unlockItem('garden');
                    }
                } else {
                    playSound('error');
                    setWrongAnswers(prev => prev + 1);
                    setFeedback({
                        isCorrect: false,
                        text: `غير دقيق! المفهوم لا ينتمي إلى هذا البعد. تذكر: ${item.reason}`
                    });
                }
            };

            const checkStage2Completion = () => {
                setFeedback(null);
                if (stage2Sorted.length === stage2Pool.length) {
                    setCurrentStage(3);
                }
            };

            const handleStage3Answer = (option) => {
                if (feedback) return;

                if (option.isCorrect) {
                    playSound('success');
                    setScore(prev => prev + 20);
                    setFeedback({
                        isCorrect: true,
                        text: `أنت مبدع وقائد ذكي! ${option.reason}`
                    });
                    unlockItem('classroom');
                } else {
                    playSound('error');
                    setWrongAnswers(prev => prev + 1);
                    setFeedback({
                        isCorrect: false,
                        text: `قرار بحاجة إلى تعديل مالي أو بيئي! ${option.reason}`
                    });
                }
            };

            const nextStage3Question = () => {
                setFeedback(null);
                if (stage3Index < stage3Questions.length - 1) {
                    setStage3Index(prev => prev + 1);
                } else {
                    // End Game!
                    playSound('complete');
                    setScreen('outro');
                }
            };

            const restartGame = () => {
                setScore(0);
                setWrongAnswers(0);
                setUnlockedItems([]);
                setFeedback(null);
                setStage1Index(0);
                setStage2Sorted([]);
                setStage3Index(0);
                setCurrentStage(1);
                setScreen('play');
            };

            return (
                <div class="w-full">
                    {/* Header Bar */}
                    <header class="mb-6 text-center">
                        <div class="inline-flex items-center gap-2 bg-emerald-600 text-white px-4 py-2 rounded-full text-sm font-semibold shadow-md animate-pulse">
                            <span>🎓 نشاط مدخلي تفاعلي ممتع</span>
                        </div>
                        <h1 class="text-3xl md:text-4xl font-extrabold text-emerald-800 mt-2">مفهوم التدريب المستدام وأهميته</h1>
                        <p class="text-emerald-600 text-sm md:text-base mt-1 font-medium">اختبر معلوماتك وقدرتك على التفكير النقدي لتشييد أكاديميتك الخضراء!</p>
                    </header>

                    {/* INTRO SCREEN */}
                    {screen === 'intro' && (
                        <div class="glass-card rounded-3xl p-6 md:p-10 shadow-2xl text-center border-t-8 border-emerald-500 transform transition duration-500 hover:scale-[1.01]">
                            <div class="text-6xl md:text-7xl mb-4 animate-bounce-slow">🏫</div>
                            <h2 class="text-2xl md:text-3xl font-extrabold text-slate-800 mb-4">أهلاً بك يا بطل الاستدامة المعرفي!</h2>
                            <p class="text-slate-600 leading-relaxed mb-6 max-w-xl mx-auto text-sm md:text-base">
                                مرحباً بك في هذا التحدي المصمم خصيصاً لقياس معارفك العميقة حول 
                                <strong class="text-emerald-700"> ركائز التدريب المستدام </strong> 
                                وأبعاده الحيوية.
                                <br />
                                كل إجابة صحيحة ستكسبك معدات لتطوير وبناء <strong class="text-emerald-700">أكاديمية تدريب افتراضية متكاملة</strong> وصديقة للبيئة!
                            </p>

                            <div class="bg-emerald-50/70 border border-emerald-100 rounded-2xl p-4 mb-8 text-right max-w-lg mx-auto">
                                <h4 class="font-bold text-emerald-800 mb-2 flex items-center gap-2 text-sm md:text-base">📌 فكرة اللعبة ورسالتها:</h4>
                                <p class="text-xs md:text-sm text-emerald-700 leading-relaxed">
                                    التدريب المستدام ليس مجرد وعاء لتخزين معلومات عابرة؛ بل هو عملية تعلم مستمرة واستثمار في الذات يعزز الصحة العقلية، ويرتقي بالإنتاجية، ويوائم بين حماية الطبيعة ونمو المجتمع والاقتصاد.
                                </p>
                            </div>

                            <button 
                                onClick={() => { playSound('success'); setScreen('play'); }}
                                class="bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold text-base md:text-lg px-8 py-4 rounded-2xl shadow-xl hover:shadow-emerald-200 transition-all duration-300 transform active:scale-95 flex items-center gap-3 mx-auto"
                            >
                                🚀 ابدأ التحدي وابنِ أكاديميتك المعرفية
                            </button>
                        </div>
                    )}

                    {/* PLAY SCREEN */}
                    {screen === 'play' && (
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            
                            {/* Left Panel: Game Play & Questions */}
                            <div class="lg:col-span-2 flex flex-col gap-6">
                                
                                {/* Progress Indicator */}
                                <div class="glass-card rounded-2xl p-4 shadow-md flex justify-between items-center text-xs md:text-sm">
                                    <div class="flex items-center gap-2">
                                        <span class="font-bold text-slate-700">المرحلة:</span>
                                        <span class="px-2 py-1 rounded-lg bg-emerald-100 text-emerald-800 font-bold">
                                            {currentStage === 1 && "1. قياس مفاهيم وركائز الاستدامة"}
                                            {currentStage === 2 && "2. فرز أبعاد الاستدامة الثلاثة"}
                                            {currentStage === 3 && "3. سيناريوهات اتخاذ القرار الحكيم"}
                                        </span>
                                    </div>
                                    <div class="flex gap-4">
                                        <span class="text-emerald-700 font-bold">⭐ النقاط: {score}</span>
                                        <span class="text-red-500 font-bold">⚠️ الأخطاء: {wrongAnswers}</span>
                                    </div>
                                </div>

                                {/* STAGE 1: CONCEPTUAL DEFINITIONS MATCHING */}
                                {currentStage === 1 && (
                                    <div class="glass-card rounded-3xl p-6 shadow-lg border-r-8 border-indigo-500 flex-1">
                                        <div class="flex justify-between items-center mb-4">
                                            <span class="bg-indigo-100 text-indigo-800 text-xs font-bold px-2.5 py-1 rounded-full">سؤال {stage1Index + 1} من {stage1Questions.length}</span>
                                            <span class="text-xs text-slate-400">اختر المفهوم المعرفي الأكثر دقة</span>
                                        </div>

                                        <div class="bg-indigo-50/70 border border-indigo-100 rounded-2xl p-4 mb-6 relative">
                                            <span class="absolute -top-4 right-4 text-3xl text-indigo-300">"</span>
                                            <p class="text-slate-700 font-semibold leading-relaxed text-sm md:text-base pr-3">
                                                {stage1Questions[stage1Index].quote}
                                            </p>
                                        </div>

                                        {!feedback ? (
                                            <div class="grid grid-cols-1 gap-3">
                                                {stage1Questions[stage1Index].options.map((option, idx) => (
                                                    <button
                                                        key={idx}
                                                        onClick={() => handleStage1Answer(option)}
                                                        class="bg-white hover:bg-indigo-50 border border-indigo-100 text-slate-700 font-bold p-3.5 rounded-xl text-right text-xs md:text-sm shadow-sm transition-all duration-200 hover:border-indigo-400 active:scale-[0.99] block w-full"
                                                    >
                                                        💡 {option.name}
                                                    </button>
                                                ))}
                                            </div>
                                        ) : (
                                            <div class={`rounded-2xl p-4 mb-6 border text-right transition-all duration-300 ${feedback.isCorrect ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'}`}>
                                                <h4 class="font-bold flex items-center gap-2 text-sm md:text-base mb-1">
                                                    {feedback.isCorrect ? "✅ معمار معرفي ممتاز!" : "❌ محاولة تحتاج مراجعة!"}
                                                </h4>
                                                <p class="text-xs md:text-sm leading-relaxed">{feedback.text}</p>
                                                <button
                                                    onClick={nextStage1Question}
                                                    class="mt-4 bg-slate-800 hover:bg-slate-900 text-white text-xs font-bold px-4 py-2 rounded-lg transition-all"
                                                >
                                                    التالي ➔
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {/* STAGE 2: SORTING TO DIMENSIONS */}
                                {currentStage === 2 && (
                                    <div class="glass-card rounded-3xl p-6 shadow-lg border-r-8 border-teal-500 flex-1">
                                        <div class="mb-4">
                                            <span class="bg-teal-100 text-teal-800 text-xs font-bold px-2.5 py-1 rounded-full">أبعاد التنمية المستدامة الثلاثة</span>
                                            <h3 class="text-lg font-bold text-slate-800 mt-2">فرز الأهداف والأبعاد</h3>
                                            <p class="text-xs text-slate-500 mt-1">اضغط على المفهوم بالأسفل، ثم اختر البعد الصحيح له من الخيارات الثلاثة.</p>
                                        </div>

                                        {/* Find the first unsorted item */}
                                        {stage2Pool.find(item => !stage2Sorted.includes(item.id)) ? (
                                            (() => {
                                                const currentItem = stage2Pool.find(item => !stage2Sorted.includes(item.id));
                                                return (
                                                    <div class="flex flex-col gap-6">
                                                        <div class="bg-teal-50 border border-teal-100 p-4 rounded-2xl text-center shadow-inner">
                                                            <span class="text-xs text-teal-600 font-bold">المفهوم المراد فرزه:</span>
                                                            <p class="text-base md:text-lg font-extrabold text-teal-900 mt-1 leading-relaxed">
                                                                "{currentItem.text}"
                                                            </p>
                                                        </div>

                                                        {!feedback ? (
                                                            <div class="grid grid-cols-3 gap-2">
                                                                <button
                                                                    onClick={() => handleStage2Sort(currentItem, 'environmental')}
                                                                    class="bg-green-100 hover:bg-green-200 text-green-800 font-bold py-4 px-2 rounded-xl text-center text-xs md:text-sm shadow-sm transition-all border border-green-200"
                                                                >
                                                                    🌱 بيئي
                                                                </button>
                                                                <button
                                                                    onClick={() => handleStage2Sort(currentItem, 'social')}
                                                                    class="bg-blue-100 hover:bg-blue-200 text-blue-800 font-bold py-4 px-2 rounded-xl text-center text-xs md:text-sm shadow-sm transition-all border border-blue-200"
                                                                >
                                                                    🤝 اجتماعي
                                                                </button>
                                                                <button
                                                                    onClick={() => handleStage2Sort(currentItem, 'economic')}
                                                                    class="bg-amber-100 hover:bg-amber-200 text-amber-800 font-bold py-4 px-2 rounded-xl text-center text-xs md:text-sm shadow-sm transition-all border border-amber-200"
                                                                >
                                                                    💰 اقتصادي
                                                                </button>
                                                            </div>
                                                        ) : (
                                                            <div class={`rounded-2xl p-4 border text-right transition-all duration-300 ${feedback.isCorrect ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'}`}>
                                                                <h4 class="font-bold flex items-center gap-2 text-sm mb-1">
                                                                    {feedback.isCorrect ? "✅ تصنيف رائع وموفق!" : "❌ تصنيف خاطئ!"}
                                                                </h4>
                                                                <p class="text-xs leading-relaxed">{feedback.text}</p>
                                                                <button
                                                                    onClick={checkStage2Completion}
                                                                    class="mt-4 bg-slate-800 hover:bg-slate-900 text-white text-xs font-bold px-4 py-2 rounded-lg transition-all"
                                                                >
                                                                    المفهوم التالي ➔
                                                                </button>
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })()
                                        ) : (
                                            <div class="text-center py-6">
                                                <div class="text-5xl mb-2">🎉</div>
                                                <p class="text-emerald-800 font-bold mb-4">أنهيت فرز جميع المفاهيم بنجاح مذهل!</p>
                                                <button
                                                    onClick={() => { playSound('success'); setCurrentStage(3); }}
                                                    class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-6 py-3 rounded-xl shadow"
                                                >
                                                    الانتقال للمرحلة الثالثة
                                                </button>
                                            </div>
                                        )}

                                        {/* Sorted items list */}
                                        <div class="mt-6 border-t border-slate-100 pt-4">
                                            <span class="text-xs font-bold text-slate-400">العناصر التي قمت بفرزها حتى الآن ({stage2Sorted.length}/{stage2Pool.length}):</span>
                                            <div class="flex flex-wrap gap-1.5 mt-2">
                                                {stage2Pool.map(item => {
                                                    const isSorted = stage2Sorted.includes(item.id);
                                                    return (
                                                        <span
                                                            key={item.id}
                                                            class={`text-[10px] px-2 py-1 rounded-md border ${isSorted ? 'bg-emerald-50 border-emerald-200 text-emerald-700 font-semibold' : 'bg-slate-50 border-slate-200 text-slate-300'}`}
                                                        >
                                                            {isSorted ? `✓ ${item.text.slice(0, 25)}...` : `⏳ قيد الفرز`}
                                                        </span>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* STAGE 3: DECISION SCENARIOS */}
                                {currentStage === 3 && (
                                    <div class="glass-card rounded-3xl p-6 shadow-lg border-r-8 border-amber-500 flex-1">
                                        <div class="flex justify-between items-center mb-4">
                                            <span class="bg-amber-100 text-amber-800 text-xs font-bold px-2.5 py-1 rounded-full">سؤال {stage3Index + 1} من {stage3Questions.length}</span>
                                            <span class="text-xs text-slate-400">مواقف قيادية مستدامة</span>
                                        </div>

                                        <div class="bg-amber-50 border border-amber-100 p-4 rounded-2xl mb-6">
                                            <span class="text-xs text-amber-800 font-extrabold flex items-center gap-1">🤔 سيناريو عملي:</span>
                                            <p class="text-slate-800 font-bold leading-relaxed text-sm md:text-base mt-2">
                                                {stage3Questions[stage3Index].scenario}
                                            </p>
                                        </div>

                                        {!feedback ? (
                                            <div class="flex flex-col gap-3">
                                                {stage3Questions[stage3Index].options.map((option, idx) => (
                                                    <button
                                                        key={idx}
                                                        onClick={() => handleStage3Answer(option)}
                                                        class="bg-white hover:bg-amber-50 border border-amber-100 text-slate-700 font-semibold p-4 rounded-xl text-right text-xs md:text-sm shadow-sm transition-all duration-200 hover:border-amber-400 active:scale-95"
                                                    >
                                                        🔸 {option.text}
                                                    </button>
                                                ))}
                                            </div>
                                        ) : (
                                            <div class={`rounded-2xl p-4 mb-6 border text-right transition-all duration-300 ${feedback.isCorrect ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'}`}>
                                                <h4 class="font-bold flex items-center gap-2 text-sm md:text-base mb-1">
                                                    {feedback.isCorrect ? "✅ خيار قيادي حكيم!" : "❌ قرار بحاجة إلى تعديل مالي وبيئي!"}
                                                </h4>
                                                <p class="text-xs md:text-sm leading-relaxed">{feedback.text}</p>
                                                <button
                                                    onClick={nextStage3Question}
                                                    class="mt-4 bg-slate-800 hover:bg-slate-900 text-white text-xs font-bold px-4 py-2 rounded-lg transition-all"
                                                >
                                                    التالي ➔
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                )}

                            </div>

                            {/* Right Panel: Virtual Training Academy Status */}
                            <div class="glass-card rounded-3xl p-6 shadow-lg border-t-4 border-emerald-600 flex flex-col justify-between">
                                <div>
                                    <h3 class="text-lg font-extrabold text-slate-800 mb-2 flex items-center gap-1">
                                        🏢 أكاديميتك المستدامة
                                    </h3>
                                    <p class="text-xs text-slate-500 mb-4 leading-relaxed">
                                        الإجابات الصحيحة في المستويات الثلاثة ستقوم ببناء وترقية أجزاء أكاديميتك الافتراضية!
                                    </p>

                                    {/* Visual Representation of Academy */}
                                    <div class="bg-gradient-to-br from-emerald-500 to-teal-600 rounded-2xl p-4 text-white text-center shadow-inner min-h-[160px] flex flex-col justify-center items-center relative overflow-hidden">
                                        <div class="absolute top-2 right-2 bg-white/20 backdrop-filter blur-sm px-2 py-0.5 rounded text-[10px] font-bold">
                                            مستوى البناء
                                        </div>
                                        
                                        {/* Icons stack based on unlocked items */}
                                        <div class="flex gap-3 justify-center text-4xl mb-3">
                                            <span class="unlocked-item">🏫</span>
                                            {unlockedItems.includes('solar') && <span class="unlocked-item" title="ألواح شمسية">☀️</span>}
                                            {unlockedItems.includes('library') && <span class="unlocked-item" title="مكتبة رقمية">💻</span>}
                                            {unlockedItems.includes('garden') && <span class="unlocked-item" title="حديقة مجتمعية">🌳</span>}
                                            {unlockedItems.includes('classroom') && <span class="unlocked-item" title="فصول ذكية">📱</span>}
                                        </div>

                                        <p class="text-sm font-extrabold">
                                            {unlockedItems.length === 0 && "أكاديمية تدريب ناشئة"}
                                            {unlockedItems.length > 0 && unlockedItems.length < 3 && "أكاديمية في مرحلة التأسيس الصديق للبيئة"}
                                            {unlockedItems.length >= 3 && unlockedItems.length < 4 && "أكاديمية مستدامة متقدمة"}
                                            {unlockedItems.length === 4 && "أكاديمية الغد المستدامة المتكاملة! 🏆"}
                                        </p>
                                        <span class="text-[10px] text-emerald-100 mt-1">
                                            لقد قمت بفتح {unlockedItems.length} من أصل 4 ترقيات
                                        </span>
                                    </div>
                                </div>

                                <div class="mt-6">
                                    <h4 class="font-bold text-slate-700 text-xs mb-2">الترقيات المفتوحة بالأكاديمية:</h4>
                                    <div class="flex flex-col gap-2">
                                        {academyItems.map(item => {
                                            const isUnlocked = unlockedItems.includes(item.id);
                                            return (
                                                <div 
                                                    key={item.id} 
                                                    class={`flex items-start gap-2.5 p-2 rounded-xl border text-right transition-all ${isUnlocked ? 'bg-emerald-50/50 border-emerald-200' : 'bg-slate-50 border-slate-200 opacity-50'}`}
                                                >
                                                    <span class="text-xl bg-white p-1 rounded-lg shadow-sm">{item.icon}</span>
                                                    <div>
                                                        <h5 class="text-xs font-bold text-slate-800 flex items-center gap-1">
                                                            {item.name}
                                                            {isUnlocked && <span class="text-[10px] text-emerald-600 bg-emerald-100 px-1 py-0.2 rounded">نشط</span>}
                                                        </h5>
                                                        <p class="text-[10px] text-slate-500 mt-0.5 leading-snug">{item.desc}</p>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>

                        </div>
                    )}

                    {/* OUTRO SCREEN */}
                    {screen === 'outro' && (
                        <div class="glass-card rounded-3xl p-6 md:p-10 shadow-2xl text-center border-t-8 border-emerald-600 relative overflow-hidden">
                            <div class="text-6xl md:text-7xl mb-4 animate-bounce-slow">🏆</div>
                            <h2 class="text-2xl md:text-3xl font-extrabold text-slate-800 mb-2">تهانينا الحارة! لقد بنيت الأكاديمية بنجاح!</h2>
                            <p class="text-slate-600 text-sm md:text-base leading-relaxed mb-6 max-w-xl mx-auto">
                                لقد اجتزت بنجاح جميع مستويات التدريب وعززت معرفتك بأسس وأبعاد التدريب المستدام. أكاديميتك الآن مجهزة بأحدث الفصول الذكية، الطاقة المتجددة، الحدائق التفاعلية، والتقنيات الصديقة للبيئة.
                            </p>

                            {/* Final Score Dashboard */}
                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 max-w-lg mx-auto mb-8">
                                <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-4">
                                    <span class="text-xs text-indigo-600 font-bold block mb-1">النقاط الكلية ⭐</span>
                                    <span class="text-2xl font-extrabold text-indigo-900">{score}</span>
                                </div>
                                <div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-4">
                                    <span class="text-xs text-emerald-600 font-bold block mb-1">نسبة النجاح 🚀</span>
                                    <span class="text-2xl font-extrabold text-emerald-900">
                                        {Math.round((score / 130) * 100)}%
                                    </span>
                                </div>
                                <div class="bg-amber-50 border border-amber-100 rounded-2xl p-4">
                                    <span class="text-xs text-amber-600 font-bold block mb-1">محاولات غير دقيقة ⚠️</span>
                                    <span class="text-2xl font-extrabold text-amber-900">{wrongAnswers}</span>
                                </div>
                            </div>

                            {/* Educational Takeaway Summary */}
                            <div class="bg-emerald-50 border border-emerald-100 rounded-2xl p-6 text-right max-w-xl mx-auto mb-8">
                                <h4 class="font-bold text-emerald-800 text-sm md:text-base mb-3 flex items-center gap-2">
                                    📚 ملخص المفاهيم التي اختبرتها في اللعبة:
                                </h4>
                                <ul class="text-xs md:text-sm text-emerald-700 space-y-2.5 leading-relaxed">
                                    <li>🔄 <strong>التعلم مدى الحياة:</strong> ركيزة أساسية تضمن التطوير والتكيف المستمر للأفراد في بيئة العمل السريعة.</li>
                                    <li>🌱 <strong>تكامل الأبعاد الثلاثة:</strong> التدريب المستدام الناجح يراعي الجوانب الاقتصادية (الإنتاجية والكفاءة)، والاجتماعية (العدالة والتمكين)، والبيئية (الموارد والمناخ).</li>
                                    <li>🧠 <strong>التطوير الشخصي والصحة الذهنية:</strong> التدريب المستمر يوسع الآفاق، ينمي الثقة بالنفس، ويحافظ على شباب الدماغ وصحته العقلية.</li>
                                    <li>⚙️ <strong>المرونة والتكيف:</strong> تصميم البرامج القابلة للتحديث والتطوير هو ما يقي الكوادر والمؤسسات من مخاطر التغير الاقتصادي الحاد.</li>
                                </ul>
                            </div>

                            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                                <button 
                                    onClick={restartGame}
                                    class="bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold text-sm px-6 py-3.5 rounded-xl shadow-md transition-all active:scale-95"
                                >
                                    🔄 العب مرة أخرى
                                </button>
                                <button 
                                    onClick={() => {
                                        const text = `حققت نتيجة ${score} في لعبة التدريب المستدام المعرفية وبنيت الأكاديمية بنجاح!`;
                                        const el = document.createElement('textarea');
                                        el.value = text;
                                        document.body.appendChild(el);
                                        el.select();
                                        document.execCommand('copy');
                                        document.body.removeChild(el);
                                        playSound('success');
                                    }}
                                    class="bg-slate-800 hover:bg-slate-950 text-white font-extrabold text-sm px-6 py-3.5 rounded-xl shadow-md transition-all active:scale-95"
                                >
                                    📋 نسخ النتيجة لمشاركتها مع المتدربين
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
